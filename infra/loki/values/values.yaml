# Loki values — single-binary mode (simplest for personal kind cluster)
# Stores chunks in MinIO (S3-compatible) once MinIO is set up;
# falls back to filesystem until then (set deploymentMode: SingleBinary).

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem  # Switch to 's3' after MinIO is ready (see comment below)
    # --- MinIO backend (activate in Phase 3) ---
    # type: s3
    # s3:
    #   endpoint: http://minio.minio-operator.svc.cluster.local
    #   bucketnames: loki
    #   region: us-east-1
    #   access_key_id: minio-access-key
    #   secret_access_key: minio-secret-key
    #   s3ForcePathStyle: true
    #   insecure: true
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    retention_period: 168h  # 7 days
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi

# Disable multi-tenant components (not needed for single-binary)
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Promtail is deployed separately (or use alloy/fluentbit)
# Enable the built-in gateway for easy access from Grafana
gateway:
  enabled: true
  service:
    port: 80

chunksCache:
  enabled: false
resultsCache:
  enabled: false

# ServiceMonitor for Prometheus scraping
monitoring:
  serviceMonitor:
    enabled: true
    labels:
      release: kps
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
