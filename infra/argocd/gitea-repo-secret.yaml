# ArgoCD Repository Secret for Gitea
# ─────────────────────────────────────────────────────────────────────────────
# Phase 6 — Apply this after Gitea is running and the repo is pushed.
# Replace this plain Secret with a SealedSecret once sealed-secrets is active.
#
# Steps:
#   1. Create repo in Gitea: https://gitea.local/admin/monitoring-logging-stack
#   2. Push: git remote add gitea https://gitea.local/admin/monitoring-logging-stack.git
#            git push gitea main
#   3. Generate a Gitea access token (User Settings → Applications → Token)
#   4. Seal this secret:
#        kubeseal --controller-namespace sealed-secrets \
#          --format yaml < gitea-repo-secret-plain.yaml > gitea-repo-secret.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: gitea-repo-monitoring-stack
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  # Use the in-cluster service DNS for ArgoCD to avoid external routing
  url: http://gitea-http.gitea.svc.cluster.local:3000/admin/monitoring-logging-stack.git
  username: admin
  # Replace with a Gitea personal access token (not your password)
  password: "REPLACE_WITH_GITEA_TOKEN"
