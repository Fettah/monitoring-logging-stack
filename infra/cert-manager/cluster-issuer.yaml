# Step 1: Self-signed bootstrapper (no external CA needed)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
  annotations:
    argocd.argoproj.io/sync-wave: '5'
spec:
  selfSigned: {}
---
# Step 2: Generate a local CA certificate signed by the above
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-ca-cert
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: '5'
spec:
  isCA: true
  commonName: local-ca
  secretName: local-ca-secret
  duration: 87600h  # 10 years
  subject:
    organizations:
      - atu-playground
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# Step 3: CA-backed ClusterIssuer — used by all *.local certificates
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: local-ca-issuer
  annotations:
    argocd.argoproj.io/sync-wave: '5'
spec:
  ca:
    secretName: local-ca-secret
