# TLS Certificate for minio.local
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: minio-tls
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  namespace: minio-operator
spec:
  secretName: minio-tls-secret
  issuerRef:
    name: local-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - minio.local
  duration: 8760h
  renewBefore: 720h
---
# MinIO Console IngressRoute
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: minio-console
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  namespace: minio-operator
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`minio.local`)
      kind: Rule
      services:
        - name: minio-console
          port: 9090
  tls:
    secretName: minio-tls-secret
---
# MinIO API IngressRoute (for S3 clients like Loki, Harbor)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: minio-api-tls
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  namespace: minio-operator
spec:
  secretName: minio-api-tls-secret
  issuerRef:
    name: local-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - minio-api.local
  duration: 8760h
  renewBefore: 720h
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: minio-api
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  namespace: minio-operator
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`minio-api.local`)
      kind: Rule
      services:
        - name: minio
          port: 80
  tls:
    secretName: minio-api-tls-secret
