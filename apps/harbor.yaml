apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - chart: harbor
      repoURL: https://helm.goharbor.io
      targetRevision: 1.16.0
      helm:
        releaseName: harbor
        valueFiles:
          - $values/infra/harbor/values/values.yaml
    - repoURL: https://github.com/Fettah/monitoring-logging-stack.git
      targetRevision: main
      ref: values
  destination:
    namespace: harbor
    name: in-cluster
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
