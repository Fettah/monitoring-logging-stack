    services:
    - name: harbor
      port: 80
  tls:
    secretName: harbor-tls-secret
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: harbor-http
  namespace: harbor
spec:
  entryPoints:
  - web
  routes:
  - kind: Rule
    match: Host(`harbor.local`)
    middlewares:
    - name: redirect-to-https
    services:
    - name: harbor
      port: 80
---
apiVersion: traefik.io/v1alpha1
