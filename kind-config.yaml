kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: kindest/node:v1.31.9
    extraPortMappings:
      # Traefik HTTP → NodePort 30080
      - containerPort: 30080
        hostPort: 80
        protocol: TCP
      # Traefik HTTPS → NodePort 30443
      - containerPort: 30443
        hostPort: 443
        protocol: TCP
      # Gitea SSH → NodePort 30022
      - containerPort: 30022
        hostPort: 2222
        protocol: TCP
  - role: worker
    image: kindest/node:v1.31.9
  - role: worker
    image: kindest/node:v1.31.9
  - role: worker
    image: kindest/node:v1.31.9
